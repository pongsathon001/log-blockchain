<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Log Integrity Auditor (Block Model)</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-slate-100 p-6 md:p-12 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">🛡️ Log Integrity Auditor</h1>
                <p class="text-slate-400 mt-2 text-sm" id="lastUpdate">กำลังเชื่อมต่อกับเซิร์ฟเวอร์...</p>
            </div>
            <div
                class="bg-slate-800 px-5 py-2 rounded-full border border-slate-700 flex items-center gap-3 text-sm shadow-lg">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-ping absolute"></span>
                <span class="w-3 h-3 bg-green-500 rounded-full relative"></span>
                <span class="font-semibold tracking-wide">Live Monitoring (20 Logs/Block)</span>
            </div>
        </div>

        <div class="overflow-x-auto bg-slate-800/50 rounded-2xl border border-slate-700 shadow-2xl backdrop-blur-sm">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-slate-300 uppercase text-xs tracking-wider border-b border-slate-700">
                        <th class="p-5 font-semibold">Block ID</th>
                        <th class="p-5 font-semibold">ช่วงเวลาที่เก็บ Log (20 รายการ)</th>
                        <th class="p-5 font-semibold">Master Hash (Blockchain)</th>
                        <th class="p-5 font-semibold text-center">สถานะ Integrity</th>
                    </tr>
                </thead>
                <tbody id="auditBody">
                    <tr>
                        <td colspan="4" class="p-10 text-center text-slate-400 animate-pulse">⏳ กำลังสแกนข้อมูลจาก
                            Blockchain...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center mt-6" id="paginationArea" style="display:none;">
            <p class="text-sm text-slate-400" id="pageInfo"></p>
            <div class="flex gap-2">
                <button onclick="changePage(-1)" id="btnPrev"
                    class="px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-colors disabled:opacity-30 disabled:cursor-not-allowed text-sm">
                    ◀ ก่อนหน้า
                </button>
                <button onclick="changePage(1)" id="btnNext"
                    class="px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-colors disabled:opacity-30 disabled:cursor-not-allowed text-sm">
                    ถัดไป ▶
                </button>
            </div>
        </div>
    </div>

    <script>
        // ตั้ง API Key ที่นี่ (ต้องตรงกับ .env)
        const API_KEY = 'log-audit-secret-2024';  // ต้องตรงกับ API_KEY ในไฟล์ .env
        const API_BASE = 'http://localhost:3000/api';
        let currentPage = 1;
        const PAGE_LIMIT = 20;

        async function fetchStatus() {
            try {
                const url = `${API_BASE}/get-status?page=${currentPage}&limit=${PAGE_LIMIT}${API_KEY ? '&apiKey=' + API_KEY : ''}`;
                const res = await fetch(url);

                if (res.status === 401) {
                    document.getElementById('auditBody').innerHTML = `
                        <tr><td colspan="4" class="p-10 text-center text-red-400">
                            🔒 API Key ไม่ถูกต้อง กรุณาตรวจสอบ API_KEY ในไฟล์ dashboard.html
                        </td></tr>`;
                    return;
                }

                const data = await res.json();
                const blocks = data.blocks;
                const pagination = data.pagination;

                const tbody = document.getElementById('auditBody');
                tbody.innerHTML = '';

                if (blocks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-500">ยังไม่มี Block ข้อมูลในระบบ</td></tr>';
                    document.getElementById('paginationArea').style.display = 'none';
                    return;
                }

                // วนลูปวาดตารางทีละ Block
                blocks.forEach(b => {
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors ${b.is_alert ? 'bg-red-900/20' : ''}`;
                    tr.innerHTML = `
                        <td class="p-5 font-bold ${b.is_alert ? 'text-red-400' : 'text-blue-400'}">
                            📦 #${b.block_id}
                        </td>
                        <td class="p-5 text-sm text-slate-300">
                            <div class="flex flex-col">
                                <span>🟢 ${b.sequence_start_time}</span>
                                <span class="text-slate-500 text-xs">ถึง</span>
                                <span>🔴 ${b.sequence_end_time}</span>
                            </div>
                        </td>
                        <td class="p-5 font-mono text-xs opacity-70">
                            ${b.master_hash}
                        </td>
                        <td class="p-5 text-center">
                            <span class="px-4 py-1.5 rounded-full text-xs font-bold shadow-lg flex items-center justify-center gap-2 max-w-max mx-auto ${b.is_alert
                                ? 'bg-red-500/10 text-red-500 border border-red-500/50 animate-pulse'
                                : 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30'
                            }">
                                ${b.is_alert ? '🚨 โดนดัดแปลง! (TAMPERED)' : '✅ ปลอดภัย (SECURE)'}
                            </span>
                            ${b.tamper_first_detected_at ? `<p class="text-xs text-red-400 mt-2">พบครั้งแรก: ${b.tamper_first_detected_at}</p>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // อัปเดต Pagination UI
                document.getElementById('paginationArea').style.display = pagination.totalPages > 1 ? 'flex' : 'none';
                document.getElementById('pageInfo').innerText = `หน้า ${pagination.page} จาก ${pagination.totalPages} (ทั้งหมด ${pagination.total} Blocks)`;
                document.getElementById('btnPrev').disabled = currentPage <= 1;
                document.getElementById('btnNext').disabled = currentPage >= pagination.totalPages;

                document.getElementById('lastUpdate').innerText = `อัปเดตล่าสุด: ${new Date().toLocaleTimeString()} (รีเฟรชทุก 5 วินาที)`;

            } catch (e) {
                console.error("เชื่อมต่อ Server ไม่สำเร็จ:", e);
                document.getElementById('auditBody').innerHTML = `
                    <tr><td colspan="4" class="p-10 text-center text-red-400">
                        ❌ ไม่สามารถเชื่อมต่อกับ Server ได้ กรุณาตรวจสอบว่าเปิด node server.js แล้วหรือยัง
                    </td></tr>`;
            }
        }

        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            fetchStatus();
        }

        // เรียกครั้งแรกทันที
        fetchStatus();
        // สั่งให้รีเฟรชอัปเดตข้อมูลอัตโนมัติทุกๆ 5 วินาที
        setInterval(fetchStatus, 5000);
    </script>

</body>

</html>
